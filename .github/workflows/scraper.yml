name: Scrape Mercado Livre Offers

on:
  schedule:
    - cron: "0 11 * * *"   # 08:00 BRT (UTC 11)
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright Chromium (with deps)
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: |
          mkdir -p out
          node mercadolivre-scraper.mjs > out/resultado.json

      - name: Upload artifact (resultado.json)
        uses: actions/upload-artifact@v4
        with:
          name: resultado-json
          path: out/resultado.json