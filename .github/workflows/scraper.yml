name: Scrape Mercado Livre Offers

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: |
          node mercadolivre-scraper.mjs > docs/resultado.json

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/resultado.json
          git commit -m "update resultado.json" || echo "no changes"
          git push
