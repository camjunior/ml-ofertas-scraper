name: Scrape Mercado Livre Offers

on:
  schedule:
    - cron: "0 11 * * *"   # 08:00 BRT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Diagnóstico (vai mostrar se node/npm existem e onde você está)
      - name: Diagnose environment
        run: |
          pwd
          ls -la
          node -v
          npm -v

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Install Playwright Chromium (with deps)
        run: |
          npx playwright install --with-deps chromium

      - name: Run scraper
        run: |
          mkdir -p out
          node ./mercadolivre-scraper.mjs > out/resultado.json

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/resultado.json
          git commit -m "chore: update offers" || echo "no changes"
          git push
